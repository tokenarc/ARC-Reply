name = "arc-reply"
main = "worker.js"
compatibility_date = "2024-03-05"

# Environment configuration
[env.production]
name = "arc-reply-prod"
routes = [
  { pattern = "arc-reply.yourdomain.com/*", zone_name = "yourdomain.com" }
]
vars = { ENVIRONMENT = "production", LOG_LEVEL = "info" }
analytics = { enabled = true }

[env.staging]
name = "arc-reply-staging"
routes = [
  { pattern = "arc-reply-staging.yourdomain.com/*", zone_name = "yourdomain.com" }
]
vars = { ENVIRONMENT = "staging", LOG_LEVEL = "debug" }
analytics = { enabled = true }

# Secrets (set via wrangler secret put)
# TELEGRAM_BOT_TOKEN
# TWITTER_API_KEY
# GROQ_API_KEY

# Observability
[observability]
enabled = true

# Limits
limits = { cpu_ms = 50 }
