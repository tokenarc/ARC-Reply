name = "arc-reply"
main = "worker.js"
compatibility_date = "2024-03-05"

# Environment configuration
[env.production]
name = "arc-reply-prod"
routes = [
  { pattern = "arc-reply.yourdomain.com/*", zone_name = "yourdomain.com" }
]

[env.staging]
name = "arc-reply-staging"
routes = [
  { pattern = "arc-reply-staging.yourdomain.com/*", zone_name = "yourdomain.com" }
]

# Environment variables
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"

[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "debug"

# Secrets (set via wrangler secret put)
# TELEGRAM_BOT_TOKEN
# TWITTER_API_KEY
# GROQ_API_KEY

# Build configuration
[build]
command = "npm install && npm run build"

# Observability
[observability]
enabled = true

# Analytics
[analytics]
enabled = true

# Limits
limits = { cpu_ms = 50 }
